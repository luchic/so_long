name: check-norminette
on: [push]
jobs:
  check-norminette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with: 
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: python -m pip install norminette
      - run: norminette .